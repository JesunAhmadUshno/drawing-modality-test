<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Reports - PulseKey Assessment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .back-button {
            background: #3e3e3e;
            border: 1px solid #555;
            color: #cccccc;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .back-button:hover {
            background: #4e4e4e;
            border-color: #666;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
        }

        .title-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .session-stats {
            font-size: 14px;
            color: #aaa;
        }

        .refresh-button {
            background: #667eea;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .refresh-button:hover {
            background: #7c8ff0;
        }

        .search-box {
            margin-bottom: 25px;
        }

        .controls-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .control-select {
            width: 100%;
            padding: 12px 14px;
            background: #2d2d2d;
            border: 1px solid #404040;
            color: #ffffff;
            border-radius: 6px;
            font-size: 14px;
        }

        .control-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: #2d2d2d;
            border: 1px solid #404040;
            color: #ffffff;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .session-card {
            background: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .session-card:hover {
            background: #3a3a3a;
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .session-id {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            word-break: break-all;
            flex: 1;
        }

        .session-date {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }

        .session-time {
            font-size: 12px;
            color: #777;
            margin-bottom: 12px;
        }

        .score-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .score-badge.high {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }

        .score-badge.medium {
            background: linear-gradient(135deg, #FF9800 0%, #E68900 100%);
        }

        .score-badge.low {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }

        .session-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .session-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: #1f1f1f;
            border: 1px solid #3a3a3a;
            color: #cfcfcf;
        }

        .meta-pill.ok {
            border-color: #2f8f4f;
            color: #8ee5a8;
        }

        .meta-pill.warn {
            border-color: #c68b2c;
            color: #ffd08a;
        }

        .meta-pill.bad {
            border-color: #a63f4c;
            color: #ffb0b8;
        }

        .detail-item {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 4px;
        }

        .detail-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .session-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-button {
            flex: 1;
            padding: 10px 12px;
            background: #3e3e3e;
            border: 1px solid #555;
            color: #cccccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .action-button:hover {
            background: #4e4e4e;
            border-color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 600;
            color: #cccccc;
            margin-bottom: 10px;
        }

        .empty-text {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .empty-button {
            background: #667eea;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .empty-button:hover {
            background: #7c8ff0;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #404040;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: #888;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 30px;
            max-width: 1250px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #667eea;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }

        .json-content {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            color: #888;
            line-height: 1.5;
        }

        .download-button {
            margin-top: 15px;
            background: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            transition: background 0.2s;
        }

        .download-button:hover {
            background: #45a049;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        .dashboard-card {
            background: #1e1e1e;
            border: 1px solid #3f3f3f;
            border-radius: 6px;
            padding: 10px;
        }

        .dashboard-card .k {
            font-size: 12px;
            color: #9c9c9c;
            margin-bottom: 6px;
        }

        .dashboard-card .v {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .section-title {
            margin: 20px 0 10px;
            font-size: 16px;
            font-weight: 700;
            color: #9ab0ff;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .image-box {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 8px;
        }

        .image-box img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            background: #111;
            border-radius: 4px;
        }

        .image-name {
            margin-top: 6px;
            font-size: 12px;
            color: #aaa;
            word-break: break-word;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .metric-table-wrap {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            overflow: hidden;
        }

        .metric-table-title {
            background: #2a2a2a;
            color: #e4e4e4;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 700;
        }

        .metric-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .metric-table td {
            border-top: 1px solid #333;
            padding: 7px 10px;
            vertical-align: top;
        }

        .metric-table td:first-child {
            color: #a8a8a8;
            width: 55%;
        }

        .metric-table td:last-child {
            color: #fff;
            font-weight: 600;
            word-break: break-word;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .chart-box {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 10px;
        }

        .chart-title {
            font-size: 13px;
            color: #cfcfcf;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .all-values-wrap {
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            max-height: 320px;
            overflow: auto;
        }

        .all-values-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .all-values-table th,
        .all-values-table td {
            border-top: 1px solid #333;
            padding: 6px 8px;
            text-align: left;
        }

        .all-values-table th {
            position: sticky;
            top: 0;
            background: #2a2a2a;
            color: #ddd;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .sessions-grid {
                grid-template-columns: 1fr;
            }

            .controls-row {
                grid-template-columns: 1fr;
            }

            .title-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .page-title {
                font-size: 24px;
            }

            .session-details {
                grid-template-columns: 1fr;
            }

            .tables-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="window.history.back()" title="Go Back">←</button>
            <button class="back-button" onclick="window.location.href='index.html'" title="Home">🏠</button>
            <h1 class="page-title">View Reports</h1>
        </div>

        <div class="title-section">
            <div class="session-stats">
                <span id="totalCount">0</span> sessions saved
            </div>
            <div>
                <button class="refresh-button" onclick="loadSessions()" style="margin-right: 10px;">🔄 Refresh</button>
                <button class="refresh-button" onclick="window.location.href='analytics-dashboard.html'">📊 Analytics</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by session ID...">
        </div>

        <div class="controls-row">
            <select class="control-select" id="sortSelect">
                <option value="new_old">Sort: New → Old</option>
                <option value="old_new">Sort: Old → New</option>
                <option value="id_asc">Sort: ID A → Z</option>
                <option value="id_desc">Sort: ID Z → A</option>
                <option value="date_asc">Sort: Date ↑</option>
                <option value="date_desc">Sort: Date ↓</option>
                <option value="time_asc">Sort: Time ↑</option>
                <option value="time_desc">Sort: Time ↓</option>
            </select>

            <select class="control-select" id="statusSelect">
                <option value="all">Filter: All</option>
                <option value="complete">Filter: Complete</option>
                <option value="errors">Filter: With Errors</option>
            </select>

            <select class="control-select" id="validitySelect">
                <option value="all">Validation: All</option>
                <option value="both_valid">Validation: Dynamic+Static ✅</option>
                <option value="dynamic_invalid">Validation: Dynamic ❌</option>
                <option value="static_invalid">Validation: Static ❌</option>
            </select>
        </div>

        <div id="loadingContainer" class="loading">
            <div class="spinner"></div>
            <div class="loading-text">Loading sessions...</div>
        </div>

        <div id="sessionsContainer" class="sessions-grid"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No Sessions Found</div>
            <div class="empty-text">Start a new task to create your first assessment session.</div>
            <button class="empty-button" onclick="window.location.href='index.html'">Start New Task</button>
        </div>
    </div>

    <!-- Report Modal -->
    <div class="modal" id="reportModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeReportModal()">×</button>
            <div class="modal-title">Session Report</div>
            <div id="reportContent"></div>
            <button class="download-button" onclick="downloadCurrentReport()">⬇️ Download JSON</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000';
        let allSessions = [];
        let currentSessionForDownload = null;
        let dashboardCharts = [];

        function formatDuration(ms) {
            const totalSeconds = Math.floor((ms || 0) / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}m ${seconds}s`;
        }

        function formatValue(value) {
            if (value === null || value === undefined) return 'N/A';
            if (typeof value === 'number') return Number.isInteger(value) ? `${value}` : value.toFixed(4);
            if (Array.isArray(value)) return JSON.stringify(value);
            if (typeof value === 'object') return JSON.stringify(value);
            return `${value}`;
        }

        function getTimeOfDayValue(timestamp) {
            const d = new Date(timestamp);
            return (d.getHours() * 3600) + (d.getMinutes() * 60) + d.getSeconds();
        }

        function flattenObject(obj, prefix = '', rows = []) {
            if (obj === null || obj === undefined) {
                rows.push({ metric: prefix, value: 'N/A' });
                return rows;
            }

            if (typeof obj !== 'object' || obj instanceof Date) {
                rows.push({ metric: prefix, value: obj });
                return rows;
            }

            if (Array.isArray(obj)) {
                if (obj.length === 0) {
                    rows.push({ metric: prefix, value: '[]' });
                } else {
                    obj.forEach((item, index) => {
                        flattenObject(item, `${prefix}[${index}]`, rows);
                    });
                }
                return rows;
            }

            Object.keys(obj).forEach((key) => {
                const nextPrefix = prefix ? `${prefix}.${key}` : key;
                flattenObject(obj[key], nextPrefix, rows);
            });

            return rows;
        }

        function buildMetricTable(title, dataObj) {
            const rows = flattenObject(dataObj)
                .filter(r => r.metric)
                .slice(0, 120)
                .map(r => `<tr><td>${r.metric}</td><td>${formatValue(r.value)}</td></tr>`)
                .join('');

            return `
                <div class="metric-table-wrap">
                    <div class="metric-table-title">${title}</div>
                    <table class="metric-table">
                        <tbody>
                            ${rows || '<tr><td>No data</td><td>N/A</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function destroyDashboardCharts() {
            dashboardCharts.forEach(chart => {
                try { chart.destroy(); } catch (e) {}
            });
            dashboardCharts = [];
        }

        function applyFiltersAndSort() {
            const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();
            const sortMode = document.getElementById('sortSelect').value;
            const statusMode = document.getElementById('statusSelect').value;
            const validityMode = document.getElementById('validitySelect').value;

            let filtered = allSessions.filter(session =>
                session.session_id.toLowerCase().includes(searchTerm)
            );

            if (statusMode === 'complete') {
                filtered = filtered.filter(session => session.is_complete);
            } else if (statusMode === 'errors') {
                filtered = filtered.filter(session => !session.is_complete || (session.total_errors || 0) > 0);
            }

            if (validityMode === 'both_valid') {
                filtered = filtered.filter(session => session.dynamic_valid && session.static_valid);
            } else if (validityMode === 'dynamic_invalid') {
                filtered = filtered.filter(session => !session.dynamic_valid);
            } else if (validityMode === 'static_invalid') {
                filtered = filtered.filter(session => !session.static_valid);
            }

            filtered.sort((a, b) => {
                if (sortMode === 'old_new' || sortMode === 'date_asc') {
                    return new Date(a.timestamp) - new Date(b.timestamp);
                }
                if (sortMode === 'new_old' || sortMode === 'date_desc') {
                    return new Date(b.timestamp) - new Date(a.timestamp);
                }
                if (sortMode === 'id_asc') {
                    return a.session_id.localeCompare(b.session_id);
                }
                if (sortMode === 'id_desc') {
                    return b.session_id.localeCompare(a.session_id);
                }
                if (sortMode === 'time_asc') {
                    return getTimeOfDayValue(a.timestamp) - getTimeOfDayValue(b.timestamp);
                }
                if (sortMode === 'time_desc') {
                    return getTimeOfDayValue(b.timestamp) - getTimeOfDayValue(a.timestamp);
                }
                return 0;
            });

            renderSessions(filtered);
        }

        async function loadSessions() {
            try {
                document.getElementById('loadingContainer').style.display = 'block';
                document.getElementById('sessionsContainer').innerHTML = '';
                document.getElementById('emptyState').style.display = 'none';

                const response = await fetch(`${API_BASE}/api/records`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                allSessions = data.sessions || [];

                document.getElementById('totalCount').textContent = allSessions.length;
                document.getElementById('loadingContainer').style.display = 'none';

                if (allSessions.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                applyFiltersAndSort();
            } catch (error) {
                console.error('Error loading sessions:', error);
                document.getElementById('loadingContainer').innerHTML = `
                    <div style="color: #f5576c; text-align: center;">
                        <div>❌ Error loading sessions</div>
                        <div style="font-size: 12px; margin-top: 10px; color: #888;">${error.message}</div>
                        <button onclick="loadSessions()" style="margin-top: 15px; background: #3e3e3e; border: 1px solid #555; color: #cccccc; padding: 8px 16px; border-radius: 4px; cursor: pointer;">Retry</button>
                    </div>
                `;
            }
        }

        function renderSessions(sessions) {
            const container = document.getElementById('sessionsContainer');
            container.innerHTML = '';

            sessions.forEach(session => {
                const card = document.createElement('div');
                card.className = 'session-card';

                const score = session.score || 0;
                let scoreBadgeClass = 'score-badge';
                if (score >= 75) scoreBadgeClass += ' high';
                else if (score >= 50) scoreBadgeClass += ' medium';
                else scoreBadgeClass += ' low';

                const dt = new Date(session.timestamp);
                const date = dt.toLocaleDateString();
                const time = dt.toLocaleTimeString();

                const completeClass = session.is_complete ? 'ok' : 'bad';
                const dynClass = session.dynamic_valid ? 'ok' : 'bad';
                const statClass = session.static_valid ? 'ok' : 'bad';

                const durationText = formatDuration(session.total_drawing_time_ms || 0);
                const pauseText = formatDuration(session.total_pause_time_ms || 0);

                card.innerHTML = `
                    <div class="session-header">
                        <div class="session-id">${session.session_id}</div>
                    </div>
                    <div class="session-date">${date}</div>
                    <div class="session-time">${time}</div>
                    <div class="${scoreBadgeClass}">Score: ${score.toFixed(1)}/100</div>
                    <div class="session-meta">
                        <div class="meta-pill ${completeClass}">${session.is_complete ? 'Complete' : 'Incomplete'}</div>
                        <div class="meta-pill ${session.total_errors > 0 ? 'warn' : 'ok'}">Errors: ${session.total_errors || 0}</div>
                        <div class="meta-pill ${dynClass}">Dynamic: ${session.dynamic_valid ? 'Valid' : 'Invalid'}</div>
                        <div class="meta-pill ${statClass}">Static: ${session.static_valid ? 'Valid' : 'Invalid'}</div>
                    </div>
                    <div class="session-details">
                        <div class="detail-item">
                            <div class="detail-label">Grade</div>
                            <div class="detail-value">${session.grade || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Tasks</div>
                            <div class="detail-value">${session.task_count || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Metrics</div>
                            <div class="detail-value">${session.metrics_extracted || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Strokes</div>
                            <div class="detail-value">${session.total_strokes || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Drawing Time</div>
                            <div class="detail-value">${durationText}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pause Time</div>
                            <div class="detail-value">${pauseText}</div>
                        </div>
                    </div>
                    <div class="session-actions">
                        <button class="action-button" onclick="viewReport('${session.session_id}')">👁️ View</button>
                        <button class="action-button" onclick="downloadReport('${session.session_id}')">⬇️ Download</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function renderDashboardCharts(report) {
            destroyDashboardCharts();
            const dynamic = report?.features?.dynamic || {};
            const shape = report?.features?.static?.shape || {};
            const assessment = report?.analysis?.assessment || {};

            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#d0d0d0' } } },
                scales: {
                    x: { ticks: { color: '#c6c6c6' }, grid: { color: '#333' } },
                    y: { ticks: { color: '#c6c6c6' }, grid: { color: '#333' } }
                }
            };

            const speedAccelCtx = document.getElementById('speedAccelChart');
            if (speedAccelCtx) {
                dashboardCharts.push(new Chart(speedAccelCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Speed Avg', 'Speed Max', 'Accel Avg', 'Accel Max'],
                        datasets: [{
                            label: 'Dynamic Magnitudes',
                            data: [
                                dynamic?.speed?.average || 0,
                                dynamic?.speed?.maximum || 0,
                                dynamic?.acceleration?.average || 0,
                                dynamic?.acceleration?.maximum || 0
                            ],
                            backgroundColor: ['#4e79ff', '#7f6dff', '#21c7a8', '#6bd66b']
                        }]
                    },
                    options: chartOptions
                }));
            }

            const timingCtx = document.getElementById('timingChart');
            if (timingCtx) {
                dashboardCharts.push(new Chart(timingCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Drawing Time', 'Pause Time'],
                        datasets: [{
                            data: [
                                dynamic?.timing?.total_drawing_time_ms || 0,
                                dynamic?.timing?.total_pause_time_ms || 0
                            ],
                            backgroundColor: ['#36a2eb', '#ff6384']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#d0d0d0' } } }
                    }
                }));
            }

            const workCtx = document.getElementById('workloadChart');
            if (workCtx) {
                dashboardCharts.push(new Chart(workCtx, {
                    type: 'line',
                    data: {
                        labels: ['Strokes', 'Points', 'Pauses', 'Dir Changes'],
                        datasets: [{
                            label: 'Session Workload',
                            data: [
                                dynamic?.timing?.strokes || 0,
                                dynamic?.timing?.points || 0,
                                dynamic?.pauses?.count || 0,
                                dynamic?.movement?.direction_changes || 0
                            ],
                            borderColor: '#9b8cff',
                            backgroundColor: 'rgba(155, 140, 255, 0.2)',
                            fill: true,
                            tension: 0.25
                        }]
                    },
                    options: chartOptions
                }));
            }

            const qualityCtx = document.getElementById('qualityChart');
            if (qualityCtx) {
                dashboardCharts.push(new Chart(qualityCtx, {
                    type: 'radar',
                    data: {
                        labels: ['Efficiency', 'Shape Quality', 'Compactness', 'Solidity', 'Symmetry X', 'Symmetry Y'],
                        datasets: [{
                            label: 'Quality Radar',
                            data: [
                                assessment?.drawing_efficiency || 0,
                                assessment?.shape_quality || 0,
                                (shape?.compactness || 0) * 100,
                                (shape?.solidity || 0) * 100,
                                Math.abs(shape?.symmetry_x || 0) * 100,
                                Math.abs(shape?.symmetry_y || 0) * 100
                            ],
                            borderColor: '#f6c453',
                            backgroundColor: 'rgba(246, 196, 83, 0.2)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#d0d0d0' } } },
                        scales: {
                            r: {
                                angleLines: { color: '#333' },
                                grid: { color: '#333' },
                                pointLabels: { color: '#c6c6c6' },
                                ticks: { color: '#c6c6c6', backdropColor: 'transparent' }
                            }
                        }
                    }
                }));
            }

            const validCtx = document.getElementById('validationChart');
            if (validCtx) {
                const dynamicValid = report?.validation?.dynamic?.is_valid ? 1 : 0;
                const staticValid = report?.validation?.static?.is_valid ? 1 : 0;
                const complete = report?.summary?.is_complete ? 1 : 0;
                dashboardCharts.push(new Chart(validCtx, {
                    type: 'polarArea',
                    data: {
                        labels: ['Dynamic Valid', 'Static Valid', 'Complete'],
                        datasets: [{
                            data: [dynamicValid, staticValid, complete],
                            backgroundColor: ['#22c55e', '#3b82f6', '#a855f7']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#d0d0d0' } } },
                        scales: { r: { ticks: { color: '#c6c6c6', backdropColor: 'transparent' }, grid: { color: '#333' } } }
                    }
                }));
            }

            const huCtx = document.getElementById('huMomentsChart');
            if (huCtx) {
                const hu = report?.features?.static?.shape?.hu_moments || [];
                dashboardCharts.push(new Chart(huCtx, {
                    type: 'scatter',
                    data: {
                        datasets: [{
                            label: 'Hu Moments',
                            data: hu.map((val, idx) => ({ x: idx + 1, y: Math.abs(val || 0) })),
                            backgroundColor: '#ff8fab'
                        }]
                    },
                    options: {
                        ...chartOptions,
                        scales: {
                            x: { ticks: { color: '#c6c6c6' }, grid: { color: '#333' }, title: { display: true, text: 'Hu Moment Index', color: '#c6c6c6' } },
                            y: { ticks: { color: '#c6c6c6' }, grid: { color: '#333' }, title: { display: true, text: 'Absolute Value', color: '#c6c6c6' } }
                        }
                    }
                }));
            }
        }

        async function viewReport(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/records/${sessionId}/details`);

                if (!response.ok) {
                    throw new Error('Failed to load dashboard details');
                }

                const details = await response.json();
                currentSessionForDownload = sessionId;

                const report = details.report || {};
                const sessionJson = details.session_json || {};
                const dynamic = report?.features?.dynamic || {};
                const staticFeatures = report?.features?.static || {};
                const assessment = report?.analysis?.assessment || {};
                const overall = assessment?.overall_assessment || {};
                const timing = dynamic?.timing || {};
                const images = details.images || [];

                const imageHtml = images.length > 0
                    ? images.map(img => `
                        <div class="image-box">
                            <img src="${API_BASE}${img.url}" alt="${img.name}">
                            <div class="image-name">${img.name}</div>
                        </div>
                    `).join('')
                    : '<div style="color:#888;font-size:13px;">No saved PNG images for this session.</div>';

                const allMeasuredRows = flattenObject({
                    report_features: report?.features || {},
                    report_analysis: report?.analysis || {},
                    session_metadata: sessionJson || {}
                }).slice(0, 400);

                const allMeasuredHtml = allMeasuredRows.map(r => `
                    <tr>
                        <td>${r.metric}</td>
                        <td>${formatValue(r.value)}</td>
                    </tr>
                `).join('');

                const reportContent = document.getElementById('reportContent');
                reportContent.innerHTML = `
                    <div class="dashboard-grid">
                        <div class="dashboard-card"><div class="k">Session ID</div><div class="v" style="font-size:14px;word-break:break-all;">${sessionId}</div></div>
                        <div class="dashboard-card"><div class="k">Score</div><div class="v">${(overall?.score || 0).toFixed(2)}</div></div>
                        <div class="dashboard-card"><div class="k">Grade</div><div class="v">${overall?.grade || 'N/A'}</div></div>
                        <div class="dashboard-card"><div class="k">Metrics</div><div class="v">${report?.summary?.metrics_extracted || 0}</div></div>
                        <div class="dashboard-card"><div class="k">Strokes</div><div class="v">${timing?.strokes || 0}</div></div>
                        <div class="dashboard-card"><div class="k">Points</div><div class="v">${timing?.points || 0}</div></div>
                        <div class="dashboard-card"><div class="k">Drawing Time</div><div class="v" style="font-size:16px;">${formatDuration(timing?.total_drawing_time_ms || 0)}</div></div>
                        <div class="dashboard-card"><div class="k">Pause Time</div><div class="v" style="font-size:16px;">${formatDuration(timing?.total_pause_time_ms || 0)}</div></div>
                    </div>

                    <div class="section-title">Saved Images</div>
                    <div class="images-grid">${imageHtml}</div>

                    <div class="section-title">Interactive Visual Graphics</div>
                    <div class="charts-grid">
                        <div class="chart-box"><div class="chart-title">Bar: Speed & Acceleration</div><div style="height:250px;"><canvas id="speedAccelChart"></canvas></div></div>
                        <div class="chart-box"><div class="chart-title">Doughnut: Drawing vs Pause Time</div><div style="height:250px;"><canvas id="timingChart"></canvas></div></div>
                        <div class="chart-box"><div class="chart-title">Line: Session Workload</div><div style="height:250px;"><canvas id="workloadChart"></canvas></div></div>
                        <div class="chart-box"><div class="chart-title">Radar: Quality Dimensions</div><div style="height:250px;"><canvas id="qualityChart"></canvas></div></div>
                        <div class="chart-box"><div class="chart-title">Polar Area: Validation Status</div><div style="height:250px;"><canvas id="validationChart"></canvas></div></div>
                        <div class="chart-box"><div class="chart-title">Scatter: Hu Moments</div><div style="height:250px;"><canvas id="huMomentsChart"></canvas></div></div>
                    </div>

                    <div class="section-title">Static and Dynamic Reports</div>
                    <div class="tables-grid">
                        ${buildMetricTable('Dynamic Metrics', dynamic)}
                        ${buildMetricTable('Static Metrics', staticFeatures)}
                    </div>

                    <div class="section-title">All Measured Values During Test</div>
                    <div class="all-values-wrap">
                        <table class="all-values-table">
                            <thead>
                                <tr><th>Metric Path</th><th>Value</th></tr>
                            </thead>
                            <tbody>
                                ${allMeasuredHtml || '<tr><td>No values</td><td>N/A</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;

                renderDashboardCharts(report);
                document.getElementById('reportModal').classList.add('active');
            } catch (error) {
                alert('Error loading report dashboard: ' + error.message);
            }
        }

        async function downloadReport(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/api/export/${sessionId}/json`);

                if (!response.ok) {
                    throw new Error('Failed to download report');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${sessionId}-report.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                alert('Error downloading report: ' + error.message);
            }
        }

        function downloadCurrentReport() {
            if (currentSessionForDownload) {
                downloadReport(currentSessionForDownload);
            }
        }

        function closeReportModal() {
            destroyDashboardCharts();
            document.getElementById('reportModal').classList.remove('active');
        }

        document.getElementById('searchInput').addEventListener('input', applyFiltersAndSort);
        document.getElementById('sortSelect').addEventListener('change', applyFiltersAndSort);
        document.getElementById('statusSelect').addEventListener('change', applyFiltersAndSort);
        document.getElementById('validitySelect').addEventListener('change', applyFiltersAndSort);

        document.addEventListener('DOMContentLoaded', loadSessions);

        document.getElementById('reportModal').addEventListener('click', (e) => {
            if (e.target.id === 'reportModal') {
                closeReportModal();
            }
        });
    </script>
</body>
</html>
